name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Compile-check Python snippets
        run: |
          find snippets -name "*.py" -print0 | xargs -0 -n1 python3 -m py_compile
          echo "All snippets compile."

      - name: Style gate (no em-dashes in README or case study)
        run: |
          if grep -n "—" README.md docs/CASE-STUDY.md; then
            echo "Em-dash found. House style says no."
            exit 1
          fi
          echo "Clean."

      - name: Lint markdown (advisory)
        continue-on-error: true
        run: npx --yes markdownlint-cli README.md "docs/*.md" --disable MD013 MD033 MD041 MD012 MD036
