name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Compile-check Python snippets
        run: |
          find snippets -name "*.py" -print0 | xargs -0 -n1 python3 -m py_compile
          echo "All snippets compile."

      - name: Pattern tests (hermetic, stdlib-only)
        run: |
          python3 -m pip install pytest pytest-cov -q
          python3 -m pytest patterns/ -q --cov=patterns --cov-report=term-missing --cov-fail-under=85
          echo "patterns green"

      - name: Style gate (no em-dashes in README or case study)
        run: |
          if grep -n "—" README.md docs/CASE-STUDY.md docs/RELIABILITY-WEEK.md patterns/*/README.md patterns/README.md; then
            echo "Em-dash found. House style says no."
            exit 1
          fi
          echo "Clean."

      - name: Lint markdown (advisory)
        continue-on-error: true
        run: npx --yes markdownlint-cli README.md "docs/*.md" --disable MD013 MD033 MD041 MD012 MD036
